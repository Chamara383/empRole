name: Redeploy EmpRole

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
  REACT_APP_API_URL: /api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: emprole-api-gateway
            context: backend/services
            dockerfile: gateway-service/Dockerfile
          - image: emprole-auth-service
            context: backend/services
            dockerfile: auth-service/Dockerfile
          - image: emprole-workforce-service
            context: backend/services
            dockerfile: workforce-service/Dockerfile
          - image: emprole-finance-service
            context: backend/services
            dockerfile: finance-service/Dockerfile
          - image: emprole-ml-service
            context: backend/services
            dockerfile: ml-service/Dockerfile
          - image: emprole-frontend
            context: frontend
            dockerfile: Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
          no-cache: true
          pull: true

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare SSH key
        id: ssh_key
        run: |
          key_path="$GITHUB_WORKSPACE/.ssh/deploy_key"
          mkdir -p "$(dirname "$key_path")"
          printf '%s' "$SSH_KEY_B64" | base64 --decode > "$key_path"
          chmod 600 "$key_path"
          echo "key_path=$key_path" >> "$GITHUB_OUTPUT"
        env:
          SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}

      - name: Create deployment directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key_path: ${{ steps.ssh_key.outputs.key_path }}
          script_stop: true
          script: |
            set -euo pipefail
            mkdir -p "$DEPLOY_PATH"

      - name: Copy production compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key_path: ${{ steps.ssh_key.outputs.key_path }}
          source: docker-compose.prod.yml
          target: ${{ env.DEPLOY_PATH }}
          overwrite: true

      - name: Redeploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_TAG: ${{ github.sha }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REACT_APP_API_URL: /api
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key_path: ${{ steps.ssh_key.outputs.key_path }}
          script_stop: true
          envs: DEPLOY_PATH,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,IMAGE_TAG,MONGODB_URI,JWT_SECRET,REACT_APP_API_URL
          script: |
            set -euo pipefail

            cd "$DEPLOY_PATH"
            mkdir -p backend frontend

            printf 'MONGODB_URI=%s\nJWT_SECRET=%s\n' "$MONGODB_URI" "$JWT_SECRET" > backend/.env
            printf 'REACT_APP_API_URL=%s\n' "$REACT_APP_API_URL" > frontend/.env

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            export DOCKERHUB_USERNAME IMAGE_TAG
            docker compose -f docker-compose.prod.yml down -v --remove-orphans
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --force-recreate --renew-anon-volumes --remove-orphans
