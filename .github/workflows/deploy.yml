name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: emprole-prod
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # If you stored secrets under an Environment, uncomment and set name:
    # environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_PASS: ${{ secrets.DOCKERHUB_PASSWORD }}
          SSH_HOST: ${{ secrets.SERVER_HOST }}
          SSH_USER: ${{ secrets.SERVER_USERNAME }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          [ -n "$DH_USER" ] || { echo "Missing DOCKERHUB_USERNAME"; exit 1; }
          [ -n "$DH_PASS" ] || { echo "Missing DOCKERHUB_PASSWORD"; exit 1; }
          [ -n "$SSH_HOST" ] || { echo "Missing SERVER_HOST"; exit 1; }
          [ -n "$SSH_USER" ] || { echo "Missing SERVER_USERNAME"; exit 1; }
          [ -n "$SSH_KEY" ] || { echo "Missing SSH_PRIVATE_KEY"; exit 1; }
          echo "All required secrets are present."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push API gateway
        uses: docker/build-push-action@v5
        with:
          context: ./backend/services
          file: ./backend/services/gateway-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/emprole-api-gateway:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/emprole-api-gateway:${{ github.sha }}

      - name: Build and push auth service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/services
          file: ./backend/services/auth-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/emprole-auth-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/emprole-auth-service:${{ github.sha }}

      - name: Build and push workforce service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/services
          file: ./backend/services/workforce-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/emprole-workforce-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/emprole-workforce-service:${{ github.sha }}

      - name: Build and push finance service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/services
          file: ./backend/services/finance-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/emprole-finance-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/emprole-finance-service:${{ github.sha }}
        
      - name: Build and push ml service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/services
          file: ./backend/services/ml-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/emprole-ml-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/emprole-ml-service:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/emprole-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/emprole-frontend:${{ github.sha }}

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 120s
          command_timeout: 60m
          script_stop: true
          script: |
            set -euo pipefail
            cd /srv/empRole

            sudo tee .env >/dev/null <<'EOF'
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            IMAGE_TAG=latest
            EOF

            echo "${{ secrets.DOCKERHUB_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "Disk usage before cleanup:"
            df -h
            sudo docker system df || true

            # Always do a light cleanup to reclaim space from old layers/containers.
            sudo docker container prune -f || true
            sudo docker image prune -af || true
            sudo docker builder prune -af || true

            # If still close to full, also prune unused volumes.
            ROOT_USAGE=$(df -P / | awk 'NR==2 {gsub("%", "", $5); print $5}')
            if [ "$ROOT_USAGE" -ge 85 ]; then
              echo "Root disk usage is ${ROOT_USAGE}%, pruning volumes..."
              sudo docker volume prune -f || true
            fi

            echo "Disk usage after cleanup:"
            df -h
            sudo docker system df || true

            # Retry pull/start to handle transient registry issues.
            for i in 1 2 3; do
              if sudo docker compose --env-file .env -f docker-compose.prod.yml up -d --remove-orphans --pull always; then
                break
              fi
              if [ "$i" -eq 3 ]; then
                echo "Deploy failed after 3 attempts."
                exit 1
              fi
              echo "Deploy attempt $i failed, retrying..."
            done

            sudo docker compose --env-file .env -f docker-compose.prod.yml ps

