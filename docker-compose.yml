services:
  api-gateway:
    build:
      context: ./backend/services
      dockerfile: gateway-service/Dockerfile
    ports:
      - "5002:5002"
    env_file:
      - ./backend/.env
    environment:
      PORT: 5002
      AUTH_SERVICE_URL: http://auth-service:5003
      WORKFORCE_SERVICE_URL: http://workforce-service:5004
      FINANCE_SERVICE_URL: http://finance-service:5005
      ML_SERVICE_URL: http://ml-service:8000
    depends_on:
      - auth-service
      - workforce-service
      - finance-service
      - ml-service

  auth-service:
    build:
      context: ./backend/services
      dockerfile: auth-service/Dockerfile
    ports:
      - "5003:5003"
    env_file:
      - ./backend/.env
    environment:
      PORT: 5003

  workforce-service:
    build:
      context: ./backend/services
      dockerfile: workforce-service/Dockerfile
    ports:
      - "5004:5004"
    env_file:
      - ./backend/.env
    environment:
      PORT: 5004

  finance-service:
    build:
      context: ./backend/services
      dockerfile: finance-service/Dockerfile
    ports:
      - "5005:5005"
    env_file:
      - ./backend/.env
    environment:
      PORT: 5005

  ml-service:
    build:
      context: ./backend/services
      dockerfile: ml-service/Dockerfile
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      MODEL_PATH: /app/ml-service/employee_attrition_model.pkl

  frontend:
    build:
      context: ./frontend
    ports:
      - "5001:5001"
    env_file:
      - ./frontend/.env
    depends_on:
      - api-gateway