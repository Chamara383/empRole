apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: emprole
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          # image: your-dockerhub-user/emprole-auth-service:latest
          image: emprole-auth-service:latest
          # imagePullPolicy: Always
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5003
          env:
            - name: PORT
              value: "5003"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: emprole-config
                  key: NODE_ENV
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: emprole-secrets
                  key: MONGODB_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: emprole-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5003
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5003
            initialDelaySeconds: 20
            periodSeconds: 20
---
