apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: emprole
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: emprole-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5001
          env:
            - name: REACT_APP_API_URL
              valueFrom:
                configMapKeyRef:
                  name: emprole-config
                  key: REACT_APP_API_URL
          readinessProbe:
            httpGet:
              path: /
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 5001
            initialDelaySeconds: 20
            periodSeconds: 20
